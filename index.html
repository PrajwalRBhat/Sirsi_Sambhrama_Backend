<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sirsi Sambhrama Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loginScreen" class="screen">
        <div class="login-box">
            <h2>Editor Login</h2>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email Address" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>
            <p id="loginError" style="color: red; display: none;">Invalid credentials.</p>
            <div class="auth-links">
                <a href="#" onclick="switchAuthScreen('registerScreen')">Register Account</a> | 
                <a href="#" onclick="switchAuthScreen('forgotScreen')">Forgot Password?</a>
            </div>
        </div>
    </div>

    <div id="registerScreen" class="screen" style="display: none;">
        <div class="login-box">
            <h2>Register Account</h2>
            <form id="registerForm">
                <input type="email" id="regEmail" placeholder="Email Address" required>
                <input type="text" id="regName" placeholder="Pen Name (e.g., Rahul)" required>
                <input type="password" id="regPassword" placeholder="Create Password" required>
                <input type="text" id="regInvite" placeholder="Admin Invite Code" required>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Send OTP</button>
            </form>
            
            <form id="regOtpForm" style="display: none; margin-top: 15px;">
                <p style="color: green; font-size: 14px;">OTP sent to your email!</p>
                <input type="text" id="regOtpCode" placeholder="Enter OTP" required>
                <button type="submit" class="btn btn-edit" style="width: 100%;">Verify & Activate</button>
            </form>
            <div class="auth-links">
                <a href="#" onclick="switchAuthScreen('loginScreen')">Back to Login</a>
            </div>
        </div>
    </div>

    <div id="forgotScreen" class="screen" style="display: none;">
        <div class="login-box">
            <h2>Reset Password</h2>
            <form id="forgotForm">
                <input type="email" id="forgotEmail" placeholder="Registered Email" required>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Send Reset OTP</button>
            </form>
            
            <form id="resetForm" style="display: none; margin-top: 15px;">
                <p style="color: green; font-size: 14px;">OTP sent to your email!</p>
                <input type="text" id="resetOtpCode" placeholder="Enter OTP" required>
                <input type="password" id="resetNewPassword" placeholder="New Password" required>
                <button type="submit" class="btn btn-edit" style="width: 100%;">Change Password</button>
            </form>
            <div class="auth-links">
                <a href="#" onclick="switchAuthScreen('loginScreen')">Back to Login</a>
            </div>
        </div>
    </div>

    <div id="dashboardScreen" class="screen" style="display: none;">
        <div class="sidebar">
            <h2 class="brand-title">ಶಿರಸಿ ಸಂಭ್ರಮ</h2>
            <p id="userDisplay" style="font-weight: bold; color: #a8dadc; margin-bottom: 5px;">Welcome!</p>
            <a href="#" onclick="changeName()" style="font-size: 12px; color: #f1c40f; text-decoration: none; display: block; margin-bottom: 15px;">✏️ Change Pen Name</a>
            <hr>
            <button class="btn btn-primary" onclick="openCreateModal()" style="width: 100%; margin-bottom: 20px;">+ New Article</button>
            <button class="btn btn-delete" onclick="logout()" style="width: 100%;">Logout</button>
        </div>

        <div class="main-content">
            <h1>My Articles</h1>
            <div id="newsGrid" class="news-grid">
                </div>
        </div>
    </div>

    <div id="createModal" class="modal">
        <div class="modal-content">
            <h2>Create New Article</h2>
            <form id="createForm">
                <input type="text" id="createTitle" placeholder="Headline" required>
                <textarea id="createArticle" rows="6" placeholder="News content..." required></textarea>
                <select id="createCategory" required>
                    <option value="Local">Local</option>
                    <option value="Sports">Sports</option>
                    <option value="Health">Health</option>
                    <option value="Politics">Politics</option>
                </select>
                <input type="text" id="createImageCap" placeholder="Image Caption" required>
                
                <div class="checkbox-group">
                    <label><input type="checkbox" id="createTrending"> Trending</label>
                    <label><input type="checkbox" id="createBreaking"> Breaking News</label>
                    <label><input type="checkbox" id="createPublished"> Published</label>
                </div>

                <label>Upload Image:</label>
                <input type="file" id="createImage" accept="image/*" required>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Publish</button>
                    <button type="button" class="btn btn-delete" onclick="closeModals()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2>Edit Article</h2>
            <form id="editForm">
                <input type="hidden" id="editId">
                <input type="text" id="editTitle" required>
                <textarea id="editArticle" rows="6" required></textarea>
                <select id="editCategory" required>
                    <option value="Local">Local</option>
                    <option value="Sports">Sports</option>
                    <option value="Health">Health</option>
                    <option value="Politics">Politics</option>
                </select>
                <input type="text" id="editImageCap" required>
                
                <div class="checkbox-group">
                    <label><input type="checkbox" id="editTrending"> Trending</label>
                    <label><input type="checkbox" id="editBreaking"> Breaking News</label>
                    <label><input type="checkbox" id="editPublished"> Published</label>
                </div>

                <label>Upload New Image (Leave blank to keep old image):</label>
                <input type="file" id="editImage" accept="image/*">
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <button type="button" class="btn btn-delete" onclick="closeModals()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
